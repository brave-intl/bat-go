name: golangci-lint
on:
  push:
    tags:
      - v*
    branches:
      - master
      - prod
      - dev
  pull_request:
    branches:
      - master
      - prod
permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        work-dir: [libs, services, tools, cmd, main]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@e7fa5ac41e1cf5b7d48e45e42232ce7ada589601 # v9.1.0
        with:
          working-directory: ${{ matrix.work-dir }}
          version: v2.6.2
          args: --timeout 3m

  # GHA doesn't implement aggregated matrix status checks natively: https://github.com/orgs/community/discussions/26822
  lint:
    name: lint
    runs-on: ubuntu-slim
    needs: [golangci]
    steps:
      - run: exit 0
